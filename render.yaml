services:
  - type: web
    name: tuck-in
    env: php
    plan: free
    buildCommand: composer install --no-dev --prefer-dist --no-interaction --no-progress
    startCommand: php -S 0.0.0.0:$PORT -t .
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: food_ordering
